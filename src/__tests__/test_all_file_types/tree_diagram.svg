<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#198665;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#48cc98;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="108%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.2"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="400" height="300" rx="12" fill="url(#bg)"/>

  <!-- Tree visualization -->
  <g stroke="#fff" stroke-width="2" fill="none">
    <!-- Edges -->
    <line x1="200" y1="60" x2="120" y2="130"/>
    <line x1="200" y1="60" x2="280" y2="130"/>
    <line x1="120" y1="130" x2="80" y2="200"/>
    <line x1="120" y1="130" x2="160" y2="200"/>
    <line x1="280" y1="130" x2="240" y2="200"/>
    <line x1="280" y1="130" x2="320" y2="200"/>
  </g>

  <!-- Nodes -->
  <g filter="url(#shadow)">
    <circle cx="200" cy="60" r="22" fill="#fff"/>
    <circle cx="120" cy="130" r="22" fill="#fff"/>
    <circle cx="280" cy="130" r="22" fill="#fff"/>
    <circle cx="80" cy="200" r="22" fill="#fff"/>
    <circle cx="160" cy="200" r="22" fill="#fff"/>
    <circle cx="240" cy="200" r="22" fill="#fff"/>
    <circle cx="320" cy="200" r="22" fill="#fff"/>
  </g>

  <!-- Labels -->
  <g font-family="system-ui, sans-serif" font-size="14" font-weight="bold" fill="#198665" text-anchor="middle" dominant-baseline="central">
    <text x="200" y="60">50</text>
    <text x="120" y="130">30</text>
    <text x="280" y="130">70</text>
    <text x="80" y="200">20</text>
    <text x="160" y="200">40</text>
    <text x="240" y="200">60</text>
    <text x="320" y="200">80</text>
  </g>

  <!-- Title -->
  <text x="200" y="265" font-family="system-ui, sans-serif" font-size="16" fill="#fff" text-anchor="middle" font-weight="600">
    Binary Search Tree
  </text>
</svg>
