services:
  - type: web
    name: frontend
    runtime: static
    buildCommand: NODE_OPTIONS=--max-old-space-size=2056 REACT_APP_API_URL=https://api.codepost.io npm run build
    staticPublishPath: ./build
    pullRequestPreviewsEnabled: false # optional
    headers:
      - path: /*
        name: X-Frame-Options
        value: sameorigin
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: NODE_VERSION
        value: 10.14.1
