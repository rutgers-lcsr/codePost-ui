name: Backmerge to Development

on:
  pull_request:
    types: [closed]
    branches: [master]

jobs:
  backmerge:
    name: Create Backmerge PR
    if: >
      github.event.pull_request.merged == true &&
      (startsWith(github.event.pull_request.head.ref, 'hotfix/') ||
       startsWith(github.event.pull_request.head.ref, 'release/'))
    runs-on: testing-codepost
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v5
        with:
          ref: master
          fetch-depth: 0

      - name: Create backmerge PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          SOURCE="${{ github.event.pull_request.head.ref }}"
          gh pr create \
            --base development \
            --head master \
            --title "chore: backmerge ${SOURCE} to development" \
            --body "Auto-generated backmerge after merging \`${SOURCE}\` into \`master\`.

          If there are conflicts, resolve them manually." || echo "PR already exists or no diff"
