# CI Tests (UI)
#
# Runs on:
#   - Push to main (day-to-day development)
#   - Push to release/* branches (cherry-picked hotfixes)
#   - Pull requests targeting main
#   - Called by other workflows (deploy_production, deploy_development) via workflow_call
#
# When called via workflow_call, accepts an optional 'ref' input to checkout
# a specific branch (e.g., a release branch for production deploy testing).
#
# Jobs: commitlint (PRs only), eslint + prettier, typescript, vitest + coverage, build

name: Perform Codepost UI Tests

on:
  push:
    branches: [main, 'release/*']
  pull_request:
    branches: [main]
  workflow_call:
    inputs:
      ref:
        description: 'Git ref to checkout (branch or tag). Defaults to the triggering ref.'
        required: false
        type: string

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  commitlint:
    name: Commit Messages
    runs-on: testing-codepost
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ inputs.ref || '' }}
          fetch-depth: 0

      - name: Install dependencies
        run: npm ci

      - name: Validate commit messages
        run: npx commitlint --from ${{ github.event.pull_request.base.sha }} --to ${{ github.event.pull_request.head.sha }}

  lint:
    name: Lint (ESLint + Prettier)
    runs-on: testing-codepost
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ inputs.ref || '' }}

      - name: Install dependencies
        run: npm ci

      - name: Run Oslint
        run: npm run lint

  typecheck:
    name: Type Check (TypeScript)
    runs-on: testing-codepost
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ inputs.ref || '' }}

      - name: Install dependencies
        run: npm ci

      - name: Run TypeScript type checking
        run: npx tsc --noEmit

  test:
    name: Tests (Vitest + coverage)
    runs-on: testing-codepost
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ inputs.ref || '' }}

      - name: Install dependencies
        run: npm ci

      - name: Run tests with coverage
        run: npx vitest run --coverage --reporter=default --reporter=junit --outputFile=test-results.xml

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ui-test-results
          path: test-results.xml
          retention-days: 7

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ui-coverage-report
          path: coverage/
          retention-days: 7

  build:
    name: Build Verification
    runs-on: testing-codepost
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ inputs.ref || '' }}

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build

      - name: Report bundle size
        run: |
          echo "## Bundle Size Report" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          du -sh build/ >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          find build/assets -type f \( -name '*.js' -o -name '*.css' \) | sort | while read -r f; do
            size=$(du -h "$f" | cut -f1)
            printf '%-60s %s\n' "$f" "$size" >> "$GITHUB_STEP_SUMMARY"
          done
          echo '```' >> "$GITHUB_STEP_SUMMARY"
