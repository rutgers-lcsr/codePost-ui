name: Release

on:
  push:
    branches: [master]

concurrency:
  group: release-ui
  cancel-in-progress: false

jobs:
  release:
    name: Semantic Release
    runs-on: testing-codepost
    permissions:
      contents: write
      issues: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install dependencies
        run: npm ci

      - name: Run semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx semantic-release
