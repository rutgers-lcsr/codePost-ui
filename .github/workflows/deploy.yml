name: Deploy with Docker

on:
  push:
    branches: [render]

jobs:
  deploy:
    runs-on: development-ui
    env:
      REACT_APP_API_URL: ${{ vars.REACT_APP_API_URL }}
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Set up Certs
        run: |
          HOSTNAME=$(hostname)
          ln -s /etc/letsencrypt/live/$HOSTNAME certs
      - name: Create .env file
        run: |
          echo "REACT_APP_API_URL=${REACT_APP_API_URL}" >> .env
      - name: Compose and push Docker image
        run: |
          docker compose build
          docker compose push
      - name: Compose and run container
        run: |
          docker compose up -d
