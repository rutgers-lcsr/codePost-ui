# Deploy Production with Docker (UI)
#
# Branching model:
#   main              — day-to-day development, auto-deploys to dev server
#   release/<version> — cut from main via "Create Release Branch" workflow
#
# Release flow:
#   1. Run "Create Release Branch" workflow to cut release/<version> from main
#   2. Test on the release branch (CI runs automatically)
#   3. Run THIS workflow with the release/<version> branch selected
#   4. Tests run against the selected branch, then deploys to production,
#      creates a git tag v<version>, and creates a GitHub Release.
#      The version is derived from the branch name (release/3.4.0 -> 3.4.0).
#
# Hotfix flow:
#   1. Fix the bug on main first
#   2. Cherry-pick the fix onto the active release branch (incrementing the
#      patch version in the branch name as needed)
#   3. Re-run THIS workflow with that release branch selected
#
# Note: Deploy the API first, then the UI. The API deploy_production workflow
# triggers update-api-client.yml to regenerate the TypeScript client if the
# API schema changed.
#
# Runners: production-ui, testing-codepost

name: Deploy Production with Docker

on:
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  tests:
    uses: ./.github/workflows/test_codepost_ui.yml

  deploy:
    needs: [tests]
    environment: production
    runs-on: production-ui
    env:
      REACT_APP_API_URL: ${{ vars.REACT_APP_API_URL }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Certs
        run: |
          HOSTNAME=$(hostname)
          cp -rflT /etc/letsencrypt/live/$HOSTNAME/ certs/

      - name: Create .env file
        run: |
          cat <<EOF > .env
          REACT_APP_API_URL=${{ vars.REACT_APP_API_URL }}
          EOF

      - name: Build container
        run: |
          docker compose build

      - name: Deploy container
        run: |
          docker compose up -d --remove-orphans --wait --wait-timeout 180

      - name: Remove docker artifacts
        run: |
          docker system prune -f

      - name: Notify deployment success
        run: echo "Deployment to production UI server successful!"

  tag:
    needs: [deploy]
    runs-on: testing-codepost
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Determine version
        id: version
        run: echo "version=${GITHUB_REF_NAME#release/}" >> "$GITHUB_OUTPUT"

      - name: Create and push version tag
        run: |
          git tag "v${{ steps.version.outputs.version }}"
          git push origin "v${{ steps.version.outputs.version }}"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "v${{ steps.version.outputs.version }}" \
            --target "${{ github.ref_name }}" \
            --title "v${{ steps.version.outputs.version }}" \
            --generate-notes
