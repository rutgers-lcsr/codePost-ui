#
# Create Release Branch (UI)
#
# Manually triggered. Cuts a release/<version> branch from main.
# Auto-detects the next minor version from the latest git tag, or accepts
# a manual version input.
#
# After running this workflow:
#   1. CI tests run automatically on the new release/* branch
#   2. When ready, deploy to production via "Deploy Production with Docker"
#      with ref=release/<version> and version=<version>
#
# Run this workflow for BOTH codePost-api and codePost-ui when preparing
# a coordinated release.

name: Create Release Branch

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g., 3.3.0). Leave empty to auto-detect from latest tag.'
        required: false

concurrency:
  group: release-branch-ui
  cancel-in-progress: false

jobs:
  create-release:
    name: Create Release Branch
    runs-on: testing-codepost
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5
        with:
          ref: main
          fetch-depth: 0

      - name: Determine version
        id: version
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            echo "version=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
            VERSION=${LATEST_TAG#v}
            IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"
            NEXT_MINOR=$((MINOR + 1))
            echo "version=${MAJOR}.${NEXT_MINOR}.0" >> "$GITHUB_OUTPUT"
          fi

      - name: Create release branch
        run: |
          git checkout -b release/${{ steps.version.outputs.version }}
          git push origin release/${{ steps.version.outputs.version }}

      - name: Summary
        run: |
          echo "## Release branch created" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Branch: \`release/${{ steps.version.outputs.version }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "Created from: \`main\`" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**Next steps:**" >> "$GITHUB_STEP_SUMMARY"
          echo "1. Test on the release branch" >> "$GITHUB_STEP_SUMMARY"
          echo "2. Deploy to production via the **Deploy Production** workflow with \`ref: release/${{ steps.version.outputs.version }}\`" >> "$GITHUB_STEP_SUMMARY"
